<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COEXISTENCE MALL - Join Our Launch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>COEXISTENCE MALL</h1>
            <p>Next Generation E-Commerce Platform</p>
        </header>

        <!-- Video Section -->
        <section class="video-section">
            <h2>Watch Our Vision</h2>
            <div class="video-container">
                <!-- Replace "your-video.mp4" with your actual video file -->
                <video controls width="100%">
                    <source src="assets/your-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <p class="video-note">👆 Replace this video with your actual MP4 file</p>
            </div>
        </section>

        <!-- Signup Form -->
        <section class="signup-section">
            <h2>Join Our Exclusive Launch List</h2>
            <p class="subtitle">Be the first to know when we launch + special founding member perks</p>
            
            <form id="signupForm" class="signup-form">
                <div class="input-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" required placeholder="your@business.com">
                </div>

                <div class="input-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Your full name">
                </div>

                <div class="input-group">
                    <label for="business">Business Name</label>
                    <input type="text" id="business" placeholder="Your company name">
                </div>

                <div class="input-group">
                    <label for="role">I want to join as:</label>
                    <select id="role">
                        <option value="">Choose your role...</option>
                        <option value="vendor">Vendor (Sell Products)</option>
                        <option value="supplier">Supplier/Brand</option>
                        <option value="investor">Investor</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">
                    Join Launch List
                </button>
            </form>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
